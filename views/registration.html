<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Swagat Inventory Agent</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .card {
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
  }
  h2 { margin-bottom: 20px; }
  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 5px;
    background: #4e73df;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #2e59d9; }
</style>
</head>
<body>

<div class="card">
  <h2>Swagat Inventory Registration</h2>
  <form method="POST" action="/register">
    <input name="client_id" placeholder="Enter Client Unique ID" required />
    <button type="submit">Register</button>
  </form>
</div>

</body>
</html>
